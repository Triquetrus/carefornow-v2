{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;">
  <div style="text-align:center;padding:40px 20px;">
    <div style="font-size:80px;margin-bottom:16px;">🏥</div>
    <h1 style="font-family:'Playfair Display',serif;font-size:3rem;color:var(--primary-dark);margin-bottom:8px;">404</h1>
    <h2 style="font-size:1.3rem;color:var(--text);margin-bottom:12px;">Page Not Found</h2>
    <p style="color:var(--text-muted);max-width:380px;margin:0 auto 28px;">
      The page you're looking for doesn't exist or has been moved.
    </p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <a href="{{ url_for('index') }}" class="btn btn-primary">← Go Home</a>
      <a href="{{ url_for('dashboard') if session.get('user_id') else url_for('register') }}" class="btn btn-outline">
        {{ 'Dashboard' if session.get('user_id') else 'Get Help Now' }}
      </a>
    </div>
  </div>
</div>
{% endblock %}
